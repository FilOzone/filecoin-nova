# Reusable workflow invoked by caller repos:
#
#   jobs:
#     deploy:
#       uses: FilOzone/filecoin-nova/.github/workflows/deploy-sites.yml@v0.7.0
#       with:
#         build_env: ${{ vars.SITE_BUILD_ENV }}   # optional multi-line
#       secrets: inherit
#
# Caller contract (secrets; via `secrets: inherit`):
#   NOVA_PIN_KEY            — always (FOC upload signing)
#   NOVA_WALLET_ADDRESS     — always (FOC wallet address)
#   NOVA_ENS_KEY            — only if any site has ens_name
#   CLOUDFLARE_API_TOKEN    — only if any site has hostname
#   NOVA_RPC_URL            — optional, Ethereum RPC override
#
# Optional inputs:
#   build_env  — multi-line KEY=VALUE exported to both `npm run build`
#                and `nova site deploy`. Use for per-repo extras
#                (third-party API tokens, feature flags).

name: Deploy sites

on:
  workflow_call:
    inputs:
      build_env:
        type: string
        required: false
        default: ""
        description: "Optional multi-line KEY=VALUE env for build + deploy"
      nova_version:
        type: string
        required: false
        default: "latest"
        description: "filecoin-nova version to install globally"
      site:
        type: string
        required: false
        default: ""
        description: "Restrict matrix to a single site (directory name). Overrides push-diff detection."
      force_all:
        type: boolean
        required: false
        default: false
        description: "Deploy every site regardless of push diff (used for full-rollout dispatches)."
    # Named secrets. Same-org callers may use `secrets: inherit`;
    # cross-org callers must explicit-map each one in their workflow.
    secrets:
      NOVA_PIN_KEY:
        required: false
      NOVA_WALLET_ADDRESS:
        required: false
      NOVA_ENS_KEY:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      NOVA_RPC_URL:
        required: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.pick.outputs.sites }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 2 }

      - id: pick
        name: Find sites to deploy
        env:
          SITE_INPUT: ${{ inputs.site }}
          FORCE_ALL: ${{ inputs.force_all }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Every deploy.json under the repo.
          mapfile -t all_paths < <(
            find . -maxdepth 6 -name deploy.json \
              -not -path '*/node_modules/*' \
              -not -path '*/dist/*' \
              -not -path '*/.git/*' \
              2>/dev/null | sed 's|^\./||' | sort -u
          )
          if [[ ${#all_paths[@]} -eq 0 ]]; then
            echo "sites=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve candidate paths based on trigger:
          #   1. inputs.site set          → just that one
          #   2. inputs.force_all         → all
          #   3. push event               → sites whose tree changed vs HEAD~1
          #   4. otherwise (dispatch etc) → all
          selected=()
          if [[ -n "$SITE_INPUT" ]]; then
            for p in "${all_paths[@]}"; do
              dir="${p%/deploy.json}"
              [[ "$(basename "$dir")" == "$SITE_INPUT" ]] && selected+=("$p")
            done
          elif [[ "$FORCE_ALL" == "true" ]]; then
            selected=("${all_paths[@]}")
          elif [[ "$EVENT_NAME" == "push" ]]; then
            # Compute changed top-level site dirs.
            mapfile -t changed < <(git diff --name-only HEAD~1 HEAD 2>/dev/null | awk -F/ '{print $1"/"$2}' | sort -u)
            for p in "${all_paths[@]}"; do
              dir="${p%/deploy.json}"
              for c in "${changed[@]}"; do
                [[ -z "$c" ]] && continue
                if [[ "$dir" == "$c" || "$dir" == "$c/"* ]]; then
                  selected+=("$p"); break
                fi
              done
            done
          else
            selected=("${all_paths[@]}")
          fi

          if [[ ${#selected[@]} -eq 0 ]]; then
            echo "No sites to deploy."
            echo "sites=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Deploying ${#selected[@]} site(s):"
          printf '  %s\n' "${selected[@]}"

          echo -n "sites=" >> "$GITHUB_OUTPUT"
          jq -cn --args '[$ARGS.positional[] | capture("(?<path>.*)/deploy\\.json") | { name: (.path | split("/") | last), path }]' "${selected[@]}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect
    if: needs.detect.outputs.sites != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serialize — parallel ENS updates from the same delegate wallet hit
      # nonce collisions (both matrix runners read nonce N, both submit tx N,
      # one wins and the other is dropped).
      max-parallel: 1
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22" }

      - name: Install filecoin-nova
        run: npm install -g filecoin-nova@${{ inputs.nova_version }}

      - name: Export build_env
        if: inputs.build_env != ''
        run: |
          echo "${{ inputs.build_env }}" >> "$GITHUB_ENV"

      - name: Install site deps
        working-directory: ${{ matrix.site.path }}
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f package.json ]]; then
            npm install
          fi

      - name: Check (if present)
        working-directory: ${{ matrix.site.path }}
        run: |
          if [[ -f package.json ]] && jq -e '.scripts.check' package.json >/dev/null 2>&1; then
            npm run check
          fi

      - name: Build (if present)
        working-directory: ${{ matrix.site.path }}
        env:
          PROD_BUILD: "1"
        run: |
          if [[ -f package.json ]] && jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            npm run build
          fi

      - name: Deploy
        working-directory: ${{ matrix.site.path }}
        env:
          NOVA_PIN_KEY:          ${{ secrets.NOVA_PIN_KEY }}
          NOVA_WALLET_ADDRESS:   ${{ secrets.NOVA_WALLET_ADDRESS }}
          NOVA_ENS_KEY:          ${{ secrets.NOVA_ENS_KEY }}
          NOVA_RPC_URL:          ${{ secrets.NOVA_RPC_URL }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Optional overrides for repos that reuse an existing Worker + KV
          # (e.g. migrating from a self-managed gateway). Unset in new repos:
          # nova provisions `filecoin-nova-gateway` + a matching KV namespace.
          NOVA_WORKER_NAME:      ${{ vars.NOVA_WORKER_NAME }}
          NOVA_KV_NAMESPACE_ID:  ${{ vars.NOVA_KV_NAMESPACE_ID }}
          NOVA_WORKER_UPLOAD:    ${{ vars.NOVA_WORKER_UPLOAD }}
        run: nova site deploy --site .
