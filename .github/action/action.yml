name: 'Nova Deploy'
description: 'Deploy static sites to Filecoin Onchain Cloud'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  path:
    description: 'Directory to deploy'
    required: false
    default: '.'
  build-command:
    description: 'Build command to run first (e.g. npm ci && npm run build)'
    required: false
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  ens-name:
    description: 'ENS domain to update after deploy'
    required: false
  label:
    description: 'Deployment label (shown in nova manage)'
    required: false
  provider-id:
    description: 'Target specific storage provider'
    required: false
  clean:
    description: 'Remove old pieces after deploy (destructive)'
    required: false
    default: 'false'
  calibration:
    description: 'Deploy to calibration testnet'
    required: false
    default: 'false'
  comment:
    description: 'Post PR comment with deploy URL'
    required: false
    default: 'true'
  nova-version:
    description: 'Nova version to install'
    required: false
    default: 'latest'

outputs:
  cid:
    description: 'IPFS CID of the deployed content'
    value: ${{ steps.deploy.outputs.cid }}
  gateway-url:
    description: 'IPFS gateway URL'
    value: ${{ steps.deploy.outputs.gateway-url }}
  ens-url:
    description: 'ENS gateway URL (if ENS was updated)'
    value: ${{ steps.deploy.outputs.ens-url }}
  tx-hash:
    description: 'ENS update transaction hash'
    value: ${{ steps.deploy.outputs.tx-hash }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Nova
      shell: bash
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        INPUT_NOVA_VERSION: ${{ inputs.nova-version }}
      run: npm install -g "filecoin-nova@${INPUT_NOVA_VERSION}"

    - name: Build
      if: inputs.build-command != ''
      shell: bash
      env:
        BUILD_COMMAND: ${{ inputs.build-command }}
      run: eval "$BUILD_COMMAND"

    - name: Deploy
      id: deploy
      shell: bash
      env:
        NOVA_PIN_KEY: ${{ env.NOVA_PIN_KEY }}
        NOVA_ENS_KEY: ${{ env.NOVA_ENS_KEY }}
        NOVA_WALLET_ADDRESS: ${{ env.NOVA_WALLET_ADDRESS }}
        NOVA_RPC_URL: ${{ env.NOVA_RPC_URL }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_ENS_NAME: ${{ inputs.ens-name }}
        INPUT_LABEL: ${{ inputs.label }}
        INPUT_PROVIDER_ID: ${{ inputs.provider-id }}
        INPUT_CLEAN: ${{ inputs.clean }}
        INPUT_CALIBRATION: ${{ inputs.calibration }}
      run: |
        # Build args array (safe from injection -- all values come from env vars)
        ARGS=()
        ARGS+=("$INPUT_PATH" "--json")

        if [ -n "$INPUT_ENS_NAME" ]; then
          ARGS+=("--ens" "$INPUT_ENS_NAME")
        else
          ARGS+=("--no-ens")
        fi

        if [ -n "$INPUT_LABEL" ]; then
          ARGS+=("--label" "$INPUT_LABEL")
        fi

        if [ -n "$INPUT_PROVIDER_ID" ]; then
          ARGS+=("--provider-id" "$INPUT_PROVIDER_ID")
        fi

        if [ "$INPUT_CLEAN" = "true" ]; then
          ARGS+=("--clean")
        fi

        if [ "$INPUT_CALIBRATION" = "true" ]; then
          ARGS+=("--calibration")
        fi

        # Use demo mode for calibnet when no NOVA_PIN_KEY is set
        if [ "$INPUT_CALIBRATION" = "true" ] && [ -z "$NOVA_PIN_KEY" ]; then
          CMD="nova demo"
          # demo supports path, --json, --ens, --provider-id, --max-pages
          # Rebuild args keeping only what demo accepts
          ARGS=("$INPUT_PATH" "--json")
          if [ -n "$INPUT_ENS_NAME" ]; then
            ARGS+=("--ens" "$INPUT_ENS_NAME")
          fi
          if [ -n "$INPUT_PROVIDER_ID" ]; then
            ARGS+=("--provider-id" "$INPUT_PROVIDER_ID")
          fi
        else
          CMD="nova deploy"
        fi

        echo "Running: $CMD ${ARGS[*]}"

        # nova --json sends progress to stderr (visible in Actions logs)
        # and only the JSON result to stdout. Capture stdout, let stderr
        # pass through for real-time progress in the workflow log.
        # Disable set -e around the call -- nova outputs {"error": "..."}
        # on failure which we parse below.
        set +e
        RESULT=$($CMD "${ARGS[@]}")
        set -e

        # Validate we got JSON
        if [ -z "$RESULT" ]; then
          echo "::error::Nova produced no output. Check the logs above for errors."
          exit 1
        fi

        if ! echo "$RESULT" | jq empty 2>/dev/null; then
          echo "::error::Nova produced invalid output: $RESULT"
          exit 1
        fi

        # Parse JSON output
        CID=$(echo "$RESULT" | jq -r '.cid // empty')
        GATEWAY_URL=$(echo "$RESULT" | jq -r '.gatewayUrl // empty')
        ENS_NAME=$(echo "$RESULT" | jq -r '.ensName // empty')
        TX_HASH=$(echo "$RESULT" | jq -r '.txHash // empty')
        ETH_LIMO_URL=$(echo "$RESULT" | jq -r '.ethLimoUrl // empty')
        ERROR=$(echo "$RESULT" | jq -r '.error // empty')

        if [ -n "$ERROR" ]; then
          echo "::error::Nova deploy failed: $ERROR"
          exit 1
        fi

        if [ -z "$CID" ]; then
          echo "::error::Nova deploy failed: no CID in output"
          echo "Raw output: $RESULT"
          exit 1
        fi

        # Set outputs
        echo "cid=$CID" >> "$GITHUB_OUTPUT"
        echo "gateway-url=$GATEWAY_URL" >> "$GITHUB_OUTPUT"
        if [ -n "$ETH_LIMO_URL" ]; then
          echo "ens-url=$ETH_LIMO_URL" >> "$GITHUB_OUTPUT"
        fi
        if [ -n "$TX_HASH" ]; then
          echo "tx-hash=$TX_HASH" >> "$GITHUB_OUTPUT"
        fi

        # Write step summary
        NETWORK="mainnet"
        if [ "$INPUT_CALIBRATION" = "true" ]; then
          NETWORK="calibration"
        fi

        {
          echo ""
          echo "### Nova Deploy"
          echo ""
          echo "| | |"
          echo "|---|---|"
          echo "| **CID** | \`$CID\` |"
          echo "| **Gateway** | [$GATEWAY_URL]($GATEWAY_URL) |"
          echo "| **Network** | $NETWORK |"
          if [ -n "$ENS_NAME" ]; then
            echo "| **ENS** | $ENS_NAME |"
          fi
          if [ -n "$ETH_LIMO_URL" ]; then
            echo "| **ENS URL** | $ETH_LIMO_URL |"
          fi
          if [ -n "$TX_HASH" ]; then
            echo "| **Tx** | \`$TX_HASH\` |"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: PR Comment
      if: github.event_name == 'pull_request' && inputs.comment == 'true' && steps.deploy.outputs.cid != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        DEPLOY_CID: ${{ steps.deploy.outputs.cid }}
        DEPLOY_GATEWAY_URL: ${{ steps.deploy.outputs.gateway-url }}
        DEPLOY_ENS_URL: ${{ steps.deploy.outputs.ens-url }}
        INPUT_CALIBRATION: ${{ inputs.calibration }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPO: ${{ github.repository }}
      run: |
        NETWORK="mainnet"
        if [ "$INPUT_CALIBRATION" = "true" ]; then
          NETWORK="calibration"
        fi

        BODY="### Nova Deploy Preview"
        BODY=$(printf '%s\n\n%s\n%s\n%s\n%s\n%s' \
          "$BODY" \
          "| | |" \
          "|---|---|" \
          "| **CID** | \`$DEPLOY_CID\` |" \
          "| **Gateway** | [$DEPLOY_GATEWAY_URL]($DEPLOY_GATEWAY_URL) |" \
          "| **Network** | $NETWORK |")

        if [ -n "$DEPLOY_ENS_URL" ]; then
          BODY=$(printf '%s\n%s' "$BODY" "| **ENS** | $DEPLOY_ENS_URL |")
        fi

        BODY=$(printf '%s\n\n%s\n%s\n%s' \
          "$BODY" \
          "---" \
          "*Deployed to [Filecoin Onchain Cloud](https://filecoin.cloud) with [Nova](https://github.com/FilOzone/filecoin-nova)*" \
          "<!-- nova-deploy-comment -->")

        # Find existing Nova comment (paginate to handle PRs with many comments)
        COMMENT_ID=$(gh api \
          "repos/${GITHUB_REPO}/issues/${PR_NUMBER}/comments" \
          --paginate \
          --jq '.[] | select(.body | contains("<!-- nova-deploy-comment -->")) | .id' \
          2>/dev/null | head -1)

        if [ -n "$COMMENT_ID" ]; then
          gh api \
            "repos/${GITHUB_REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH \
            -f body="$BODY"
        else
          gh api \
            "repos/${GITHUB_REPO}/issues/${PR_NUMBER}/comments" \
            -f body="$BODY"
        fi
